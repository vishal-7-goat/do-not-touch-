:root {
  --bg:      #0c0a08;
  --s1:      #151210;
  --s2:      #1e1a16;
  --s3:      #2a241e;
  --b1:      rgba(255,255,255,0.06);
  --b2:      rgba(255,255,255,0.12);
  --b3:      rgba(255,255,255,0.22);
  --cream:   #f2ead8;
  --muted:   #6b6054;
  --muted2:  #9c8e7a;
  --fire:    #ff4800;
  --ember:   #ff8c00;
  --gold:    #d4a843;
  --gold2:   #f5cc6a;
  --glow:    rgba(212,168,67,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--cream);font-family:'VFC',serif;min-height:100vh;overflow-x:hidden;}

/* animated bg pattern */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px),
    repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,0.012) 60px,rgba(255,255,255,0.012) 61px);
}

.app{max-width:430px;margin:0 auto;padding:0 0 90px;position:relative;z-index:1;}

/* ── HEADER ── */
.hdr{padding:52px 20px 0;position:relative;}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.hdr-left{flex:1;}
.tag-line{
  font-size:10px;letter-spacing:0.45em;text-transform:uppercase;
  color:var(--gold);opacity:0.75;margin-bottom:10px;
}
.big-title{
  font-size:52px;line-height:0.95;color:var(--cream);letter-spacing:0.01em;
  text-shadow:0 0 80px rgba(212,168,67,0.22);
}
.big-title span{
  display:block;
  background:linear-gradient(135deg,var(--gold2) 0%,var(--gold) 50%,var(--ember) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.date-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--b2);border-radius:20px;
  padding:5px 14px;font-size:11px;letter-spacing:0.12em;
  color:var(--muted2);text-transform:uppercase;margin-top:12px;
}
.notif-btn{
  flex-shrink:0;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:8px;padding:8px 14px;
  font-family:'VFC',serif;font-size:11px;letter-spacing:0.1em;
  color:var(--muted2);cursor:pointer;transition:all 0.2s;
  white-space:nowrap;margin-top:4px;
}
.notif-btn.on{border-color:var(--gold);color:var(--gold);}
.hdr-rule{
  display:flex;align-items:center;gap:0;margin:20px 0 0;
}
.hdr-rule-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.25;}
.hdr-rule-glyph{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
}

/* ── STREAK HERO ── */
.hero{
  margin:20px 16px 0;
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:6px;
  padding:0;
  position:relative;overflow:hidden;
}
.hero-top-bar{
  height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--fire) 20%,var(--ember) 50%,var(--gold) 80%,transparent 100%);
}
.hero-body{padding:28px 24px 24px;text-align:center;}
.flame-svg{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:12px;
  filter:drop-shadow(0 0 20px rgba(255,72,0,0.7)) drop-shadow(0 0 50px rgba(255,140,0,0.4));
  animation:fpulse 2s ease-in-out infinite;
}
@keyframes fpulse{

/* ── SECTION HEADER ── */
.sec{padding:28px 16px 0;}

.sec-line{flex:1;height:1px;background:var(--b2);}
.sec-lbl{font-size:10px;letter-spacing:0.32em;text-transform:uppercase;color:var(--gold);}

/* ── PROGRESS ── */
.prog-card{

  padding:18px 20px;margin-bottom:14px;position:relative;overflow:hidden;
}
.prog-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,0.4),transparent);
}
.prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.prog-n{font-size:22px;color:var(--cream);}
.prog-p{font-size:13px;color:var(--muted2);letter-spacing:0.08em;}
.prog-bar{height:4px;background:var(--s3);border-radius:4px;overflow:hidden;}
.prog-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--fire),var(--ember),var(--gold));
  transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── HABIT CARDS ── */
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hcard{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:6px;padding:18px 16px 16px;
  cursor:pointer;transition:all 0.25s;
  position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.hcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),transparent);
  opacity:0;transition:opacity 0.25s;
}
.hcard.done{
  background:linear-gradient(145deg,rgba(212,168,67,0.1),rgba(212,168,67,0.04));
  border-color:rgba(212,168,67,0.35);
}
.hcard.done::before{opacity:1;}
.hcard:active{transform:scale(0.96);}
.hcard-glow{
  position:absolute;top:-30px;left:-30px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,168,67,0.18),transparent 70%);
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.hcard.done .hcard-glow{opacity:1;}
.icon-box{
  width:46px;height:46px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;position:relative;
  transition:all 0.25s;
}
.icon-box-dsa   {background:rgba(120,80,255,0.12);border:1px solid rgba(120,80,255,0.25);}
.icon-box-leet  {background:rgba(255,120,30,0.12);border:1px solid rgba(255,120,30,0.25);}
.icon-box-git   {background:rgba(30,200,120,0.12);border:1px solid rgba(30,200,120,0.25);}
.icon-box-ml    {background:rgba(30,160,255,0.12);border:1px solid rgba(30,160,255,0.25);}
.hcard.done .icon-box{background:rgba(212,168,67,0.15)!important;border-color:rgba(212,168,67,0.45)!important;box-shadow:0 0 20px rgba(212,168,67,0.2);}
.hcard.done .icon-box svg path,
.hcard.done .icon-box svg circle,
.hcard.done .icon-box svg rect,
.hcard.done .icon-box svg polyline,
.hcard.done .icon-box svg line,
.hcard.done .icon-box svg ellipse{stroke:var(--gold)!important;}
.hname{font-size:12px;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;line-height:1.4;}
.hcard.done .hname{color:var(--gold);}
.hstreak{font-size:11px;color:var(--muted);letter-spacing:0.05em;}
.hcard.done .hstreak{color:rgba(212,168,67,0.6);}
.hcheck{
  position:absolute;top:14px;right:14px;
  width:20px;height:20px;border-radius:3px;
  border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.hcard.done .hcheck{background:var(--gold);border-color:var(--gold);}
.cksvg{width:10px;height:10px;opacity:0;transition:opacity 0.2s;}
.hcard.done .cksvg{opacity:1;}

/* ── CTA BUTTON ── */
.cta-btn{
  display:block;margin:14px 16px 0;width:calc(100% - 32px);
  padding:18px;border-radius:6px;
  border:1px solid var(--b2);background:var(--s1);
  font-family:'VFC',serif;font-size:14px;
  letter-spacing:0.18em;text-transform:uppercase;

}
.cta-btn::before{

  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity 0.3s;
}
.cta-btn.won{
  background:linear-gradient(135deg,#1c0800,#2e1200);
  border-color:var(--fire);color:var(--ember);
  box-shadow:0 0 30px rgba(255,72,0,0.15),inset 0 1px 0 rgba(255,140,0,0.2);
}
.cta-btn.won::before{opacity:1;}
.cta-btn:active{transform:scale(0.99);}

/* ── HEATMAP ── */
.hmap-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:6px;
  padding:20px;position:relative;overflow:hidden;
}
.hmap-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,168,67,0.3),transparent);
}
.hm-grid{display:flex;gap:3px;flex-wrap:wrap;}
.hm-cell{width:13px;height:13px;border-radius:2px;transition:background 0.2s;}
.hm-0{background:#1e1a16;}
.hm-1{background:rgba(255,72,0,0.22);}
.hm-2{background:rgba(255,100,0,0.48);}
.hm-3{background:rgba(255,130,0,0.72);}
.hm-4{background:var(--ember);box-shadow:0 0 4px rgba(255,140,0,0.5);}
.hm-leg{display:flex;align-items:center;gap:4px;margin-top:10px;}
.hm-leg-lbl{font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}

/* ── BOTTOM BAR ── */
.bot-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(12,10,8,0.95);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--b1);
  padding:10px 20px 24px;
  display:flex;align-items:center;justify-content:space-between;z-index:100;
}
.bot-date{font-size:11px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
.inst-btn{
  display:none;background:transparent;border:1px solid var(--gold);
  border-radius:4px;padding:6px 16px;font-family:'VFC',serif;
  font-size:11px;color:var(--gold);cursor:pointer;letter-spacing:0.12em;
}

/* ── TOAST ── */
.toast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:var(--s2);border:1px solid var(--b2);border-top:2px solid var(--gold);
  border-radius:6px;padding:10px 22px;
  font-size:12px;letter-spacing:0.1em;color:var(--cream);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

<body>
<div class="app">

<script>
const ICONS = {
  dsa:`<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(120,80,255,0.85)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="11" r="2"/><circle cx="11" cy="4" r="2"/><circle cx="18" cy="7" r="2"/><circle cx="11" cy="18" r="2"/><line x1="6" y1="10.2" x2="9.1" y2="5.8"/><line x1="6" y1="11.8" x2="9.1" y2="16.2"/><line x1="13" y1="4.8" x2="16.1" y2="6.2"/></svg>`,
  leet:`<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(255,120,30,0.85)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="18" height="18" rx="3"/><polyline points="6 8 10 11 6 14"/><line x1="12" y1="14" x2="17" y2="14"/></svg>`,
  github:`<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(30,200,120,0.85)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="3"/><circle cx="4" cy="4" r="2"/><circle cx="18" cy="4" r="2"/><line x1="11" y1="3" x2="11" y2="8"/><path d="M6 5.5C7 7 9 8 11 8"/><path d="M16 5.5C15 7 13 8 11 8"/><line x1="11" y1="14" x2="11" y2="20"/><circle cx="11" cy="20" r="1.5"/></svg>`,
  ml:`<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="rgba(30,160,255,0.85)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="11" cy="11" rx="3" ry="3"/><line x1="11" y1="2" x2="11" y2="8"/><line x1="11" y1="14" x2="11" y2="20"/><line x1="2" y1="11" x2="8" y2="11"/><line x1="14" y1="11" x2="20" y2="11"/><line x1="4.22" y1="4.22" x2="8.34" y2="8.34"/><line x1="13.66" y1="13.66" x2="17.78" y2="17.78"/><line x1="17.78" y1="4.22" x2="13.66" y2="8.34"/><line x1="8.34" y1="13.66" x2="4.22" y2="17.78"/></svg>`,
};
const ICLASS = {dsa:'icon-box-dsa',leet:'icon-box-leet',github:'icon-box-git',ml:'icon-box-ml'};
const HABITS = [
  {key:'dsa',   name:'DSA · Kunal',    ic:'dsa'},
  {key:'leet',  name:'LeetCode',       ic:'leet'},
  {key:'github',name:'GitHub Commit',  ic:'github'},
  {key:'ml',    name:'ML Study',       ic:'ml'},
];
const MSGS = [
  {m:0,  t:'Start today. <em>Don\'t let day 0 become your identity.</em>'},
  {m:1,  t:'Day 1 done. <em>The hardest one is always the first.</em>'},
  {m:3,  t:'3 days straight. <em>Habits are forming, bhai.</em>'},
  {m:7,  t:'One full week. <em>You said new chapter. This is it. 🔱</em>'},
  {m:14, t:'Two weeks of war. <em>Mahadev sees it all.</em>'},
  {m:21, t:'21 days locked in. <em>You\'re built different now.</em>'},
  {m:30, t:'30 day streak. <em>CR7-level discipline. Unstoppable. 🏆</em>'},
];
const gs=()=>{try{return JSON.parse(localStorage.getItem('nzd_v1')||'{}');}catch{return {};}};
const ss=s=>{try{localStorage.setItem('nzd_v1',JSON.stringify(s));}catch{}};
const dk=n=>{const d=new Date();d.setDate(d.getDate()-n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
const tk=()=>dk(0);
function streak(s){const t=tk();const td=HABITS.every(h=>s[t]&&s[t][h.key]);let c=0;for(let i=td?0:1;i<365;i++){const k=dk(i);if(s[k]&&HABITS.every(h=>s[k][h.key]))c++;else break;}return c;}
function best(s){let b=0,c=0;for(let i=364;i>=0;i--){const k=dk(i);if(s[k]&&HABITS.every(h=>s[k][h.key])){c++;if(c>b)b=c;}else c=0;}return b;}
function total(s){let c=0;for(let i=364;i>=0;i--){const k=dk(i);if(s[k]&&HABITS.some(h=>s[k][h.key]))c++;}return c;}
function hstreak(key,s){const t=tk();const td=s[t]&&s[t][key];let c=0;for(let i=td?0:1;i<365;i++){const k=dk(i);if(s[k]&&s[k][key])c++;else break;}return c;}
function msg(n){const o=MSGS.filter(m=>n>=m.m);return o[o.length-1].t;}
function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function toggle(key){const s=gs();const t=tk();if(!s[t])s[t]={};s[t][key]=!s[t][key];ss(s);if(s[t][key])toast('✓ '+HABITS.find(h=>h.key===key).name);render();}
function markAll(){const s=gs();const t=tk();if(!s[t])s[t]={};const all=HABITS.every(h=>s[t][h.key]);HABITS.forEach(h=>s[t][h.key]=!all);ss(s);if(!all)toast('⚔ All battles won. Mahadev approves 🔱');render();}
function sched(s){
  if(!('serviceWorker' in navigator)||Notification.permission!=='granted')return;
  const t=tk();if(s[t]&&HABITS.every(h=>s[t][h.key]))return;
  const now=new Date(),tgt=new Date();tgt.setHours(21,0,0,0);
  if(now>=tgt)tgt.setDate(tgt.getDate()+1);
  const sr=streak(s);
  const m=sr>=7?{title:`🔥 ${sr} day streak on the line!`,body:"Don't let it die tonight, bhai."}
    :sr>=3?{title:`⚡ ${sr} days strong!`,body:"5 mins. Don't break the chain."}
    :{title:"No Zero Days, bhai.",body:"Clock's ticking. Log before midnight."};
  navigator.serviceWorker.ready.then(sw=>sw.active&&sw.active.postMessage({type:'SCHEDULE_NOTIFICATION',delay:tgt-now,...m}));
}
async function reqNotif(){
  if(!('Notification' in window)){toast('Not supported here');return;}
  const p=await Notification.requestPermission();
  const btn=document.getElementById('notif-btn');
  if(p==='granted'){btn.textContent='✓ Alerts On';btn.classList.add('on');toast('Streak reminders ON 🔥');sched(gs());}
  else toast('Allow notifications in browser settings');
}
function render(){
  const s=gs();const t=tk();const td=s[t]||{};
  const now=new Date();
  document.getElementById('date-pill').textContent=now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
  document.getElementById('bot-date').textContent=now.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}).toUpperCase();

  const sr=streak(s);
  document.getElementById('snum').textContent=sr;
  document.getElementById('best-n').textContent=best(s);
  document.getElementById('total-n').textContent=total(s);
  document.getElementById('hero-msg').innerHTML=msg(sr);

  const done=HABITS.filter(h=>td[h.key]).length;
  const pct=Math.round((done/HABITS.length)*100);
  document.getElementById('done-n').textContent=done;
  document.getElementById('done-n2').textContent=done;
  document.getElementById('prog-p').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';

  const grid=document.getElementById('hgrid');grid.innerHTML='';
  HABITS.forEach(h=>{
    const isDone=!!td[h.key];
    const hs=hstreak(h.key,s);
    const card=document.createElement('div');
    card.className='hcard'+(isDone?' done':'');
    card.innerHTML=`
      <div class="hcard-glow"></div>
      <div class="hcheck"><svg class="cksvg" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="#0c0a08" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="icon-box ${ICLASS[h.ic]}">${ICONS[h.ic]}</div>
      <div class="hname">${h.name}</div>
      <div class="hstreak">${hs>0?'— '+hs+' day streak':'Not started yet'}</div>
    `;
    card.onclick=()=>toggle(h.key);
    grid.appendChild(card);
  });

  const all=HABITS.every(h=>td[h.key]);
  const btn=document.getElementById('cta-btn');
  btn.textContent=all?'⚔ All Battles Won — 🔱':'Mark All Complete';
  btn.className='cta-btn'+(all?' won':'');

  const hm=document.getElementById('hm-grid');hm.innerHTML='';
  for(let i=83;i>=0;i--){
    const k=dk(i);const dd=s[k]||{};
    const cnt=HABITS.filter(h=>dd[h.key]).length;
    const lv=cnt===0?0:cnt<=1?1:cnt<=2?2:cnt<=3?3:4;
    const c=document.createElement('div');
    c.className=`hm-cell hm-${lv}`;hm.appendChild(c);
  }
  sched(s);
}

let dp;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;document.getElementById('inst-btn').style.display='block';});
document.getElementById('inst-btn').addEventListener('click',async()=>{
  if(!dp)return;dp.prompt();const r=await dp.userChoice;
  if(r.outcome==='accepted')toast('App installed! Locked in 🔱');
  dp=null;document.getElementById('inst-btn').style.display='none';
});
if(window.matchMedia('(display-mode: standalone)').matches)document.getElementById('inst-btn').style.display='none';
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').then(()=>{
  if(Notification.permission==='granted'){document.getElementById('notif-btn').textContent='✓ Alerts On';document.getElementById('notif-btn').classList.add('on');}
});
render();
</script>
